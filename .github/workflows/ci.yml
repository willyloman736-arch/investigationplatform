name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        # Non-secret placeholders so the build compiles in CI. Real values live
        # in Vercel project settings, never in the repo. DEMO_MODE keeps the
        # build self-contained (no live Supabase needed to verify compilation).
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
          ESCROW_PROVIDER_API_KEY: "placeholder-provider-key"
          ESCROW_PROVIDER_WEBHOOK_SECRET: "placeholder-webhook-secret"
